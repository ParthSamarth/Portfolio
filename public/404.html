<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Parth Samarth</title>
  <script>
    const path = window.location.pathname;
    const base = '/parthsamrth';
    if (path.startsWith(base)) {
      sessionStorage.setItem('spa-redirect', path.slice(base.length) || '/');
    }
    window.location.replace(base + '/');
  </script>
</head>
</html>
